<html lang="ko">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.c360a.salesforce.com/beacon/c360a/4489b089-e5f0-444c-8f12-fdaca230979b/scripts/c360a.min.js?wtcp_id=1NDKa00000006naOAA"></script>
    <title>Contact Us (cdn test3)</title>

  body>
    <div class="form-wrapper">
      <h1 class="form-heading">Contact Us</h1>
      <p class="form-subtext">
        Automate tasks with superhuman Document AI and unlock the powerful
        capabilities of Solar LLM. Contact us to elevate your work intelligence
        today.
      </p>
      <form
        action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&amp;orgId=00DJP000001mm3N"
        method="POST"
      >
        <input type="hidden" name="oid" value="00DJP000001mm3N" />
        <input type="hidden" name="retURL" value="https://www.upstage.ai" />
        <input type="hidden" name="00NJP00000190oG" id="utm_source" />
        <input type="hidden" name="00NJP00000190oF" id="utm_medium" />
        <input type="hidden" name="00NJP00000190oE" id="utm_campaign" />
        <input type="hidden" name="Campaign_ID" id="Campaign_ID" />

        <!-- First Name (성) -->
        <div class="field-group">
          <label class="form-label" for="first_name"
            >First Name<span class="required-mark">*</span></label
          >
          <input
            class="form-input"
            id="first_name"
            maxlength="40"
            name="first_name"
            type="text"
            placeholder="First name"
            required
          />
        </div>

        <!-- Last Name (이름) -->
        <div class="field-group">
          <label class="form-label" for="last_name"
            >Last Name<span class="required-mark">*</span></label
          >
          <input
            class="form-input"
            id="last_name"
            maxlength="80"
            name="last_name"
            type="text"
            placeholder="Last name"
            required
          />
        </div>

        <!-- Email -->
        <div class="field-group">
          <label class="form-label" for="email"
            >Email<span class="required-mark">*</span></label
          >
          <input
            class="form-input"
            id="email"
            maxlength="40"
            name="email"
            type="text"
            placeholder="Email Address"
            required
          />
        </div>

        <!-- Phone -->
        <div class="field-group">
          <label class="form-label" for="phone"
            >Phone<span class="required-mark">*</span></label
          >
          <input
            class="form-input"
            id="phone"
            maxlength="40"
            name="phone"
            type="text"
            placeholder="Phone Number"
            required
          />
        </div>

        <!-- Company -->
        <div class="field-group">
          <label class="form-label" for="company"
            >Company<span class="required-mark">*</span></label
          >
          <input
            class="form-input"
            id="company"
            maxlength="40"
            name="company"
            type="text"
            placeholder="Company Name"
            required
          />
        </div>

        <!-- Interests -->
        <div class="field-group">
          <label class="form-label"
            >Interests<span class="required-mark">*</span></label
          >
          <div class="interests-grid">
            <label class="interest-card">
              <input type="checkbox" name="interests__c" value="Solar LLMs" />
              <span class="interest-text">
                <span class="interest-title">Solar LLMs</span>
                <span class="interest-subtext">(Large Language Models)</span>
              </span>
              <svg
                class="interest-info"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="10"
                  cy="10"
                  r="9"
                  stroke="currentColor"
                  stroke-width="1.2"
                ></circle>
                <text
                  x="10"
                  y="14"
                  text-anchor="middle"
                  font-size="11"
                  fill="currentColor"
                >
                  ?
                </text>
              </svg>
            </label>

            <label class="interest-card">
              <input type="checkbox" name="interests__c" value="Document AI" />
              <span class="interest-text">
                <span class="interest-title">Document AI</span>
              </span>
              <svg
                class="interest-info"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="10"
                  cy="10"
                  r="9"
                  stroke="currentColor"
                  stroke-width="1.2"
                ></circle>
                <text
                  x="10"
                  y="14"
                  text-anchor="middle"
                  font-size="11"
                  fill="currentColor"
                >
                  ?
                </text>
              </svg>
            </label>

            <label class="interest-card">
              <input type="checkbox" name="interests__c" value="AI Education" />
              <span class="interest-text">
                <span class="interest-title">AI Education</span>
              </span>
              <svg
                class="interest-info"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="10"
                  cy="10"
                  r="9"
                  stroke="currentColor"
                  stroke-width="1.2"
                ></circle>
                <text
                  x="10"
                  y="14"
                  text-anchor="middle"
                  font-size="11"
                  fill="currentColor"
                >
                  ?
                </text>
              </svg>
            </label>

            <label class="interest-card">
              <input type="checkbox" name="interests__c" value="Studio" />
              <span class="interest-text">
                <span class="interest-title">Studio</span>
              </span>
              <svg
                class="interest-info"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="10"
                  cy="10"
                  r="9"
                  stroke="currentColor"
                  stroke-width="1.2"
                ></circle>
                <text
                  x="10"
                  y="14"
                  text-anchor="middle"
                  font-size="11"
                  fill="currentColor"
                >
                  ?
                </text>
              </svg>
            </label>

            <label class="interest-card">
              <input
                type="checkbox"
                name="interests__c"
                value="Other Solutions"
              />
              <span class="interest-text">
                <span class="interest-title">Other Solutions</span>
              </span>
              <svg
                class="interest-info"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="10"
                  cy="10"
                  r="9"
                  stroke="currentColor"
                  stroke-width="1.2"
                ></circle>
                <text
                  x="10"
                  y="14"
                  text-anchor="middle"
                  font-size="11"
                  fill="currentColor"
                >
                  ?
                </text>
              </svg>
            </label>
          </div>
        </div>

        <!-- Usecase -->
        <div class="field-group">
          <label class="form-label" for="usecase"
            >Tell us about your usecase<span class="required-mark"
              >*</span
            ></label
          >
          <input
            class="form-input"
            id="usecase"
            maxlength="255"
            name="usecase"
            type="text"
            placeholder="Briefly describe your use case or requirements"
            required
          />
        </div>
        <input class="button" type="submit" name="submit" value="Submit" />
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
